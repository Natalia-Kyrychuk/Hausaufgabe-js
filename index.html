<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeQuiz – Programmier-Begriffe lernen</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- START SCREEN -->
  <div id="screen-start" class="screen active">
    <div class="start-hero">
      <div class="hero-label">Programmieren lernen</div>
      <h1 class="hero-title">Code<span class="accent">Quiz</span></h1>
      <p class="hero-sub">Errate die Begriffe aus 5 Programmiersprachen.<br>Wähle deine Kategorien und starte das Quiz!</p>
    </div>

    <div class="cat-section">
      <p class="cat-hint">Kategorie(n) auswählen:</p>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <button class="btn-start" id="btn-start" disabled onclick="startQuiz()">
      Quiz starten →
    </button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <button class="btn-back" onclick="goHome()">← Zurück</button>
      <div class="quiz-meta">
        <span id="q-num-label">Frage 1 / 10</span>
        <span class="cat-pill" id="cat-pill"></span>
      </div>
      <div class="quiz-scores">
        <span class="score-c" id="sc">0 ✓</span>
        <span class="score-w" id="sw">0 ✗</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="quiz-body">
      <div class="desc-card">
        <div class="desc-text" id="desc-text">...</div>
      </div>

      <div class="boxes-row">
        <div class="letter-boxes" id="letter-boxes"></div>
        <button class="btn-hint" id="btn-hint" onclick="showHint()">💡 Hinweis</button>
      </div>

      <div class="input-row">
        <input
          class="term-input"
          id="term-input"
          type="text"
          placeholder="Begriff auf Englisch eingeben..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-check" id="btn-check" onclick="checkAnswer()">Prüfen</button>
      </div>

      <div class="feedback-box" id="feedback-box"></div>

      <button class="btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">
        Weiter →
      </button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="result-inner">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <h2 class="result-title" id="result-title">Ausgezeichnet!</h2>
      <p class="result-sub" id="result-sub"></p>
      <div class="result-bar-wrap">
        <div class="result-bar-fill" id="result-bar-fill"></div>
      </div>
      <div class="result-btns">
        <button class="btn-outline" onclick="restartSame()">↺ Nochmal</button>
        <button class="btn-outline" onclick="goHome()">⌂ Kategorien</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
